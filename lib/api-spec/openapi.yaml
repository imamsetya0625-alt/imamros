openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Game Top-Up Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: games
    description: Game catalog operations
  - name: products
    description: Top-up product operations
  - name: orders
    description: Order operations
  - name: admin
    description: Admin operations
  - name: payment
    description: Payment webhook operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /games:
    get:
      operationId: getGames
      tags: [games]
      summary: List all available games
      responses:
        "200":
          description: List of games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"

  /games/{gameId}/products:
    get:
      operationId: getProductsByGame
      tags: [products]
      summary: Get top-up products for a specific game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new top-up order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithPayment"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/check:
    post:
      operationId: checkOrderStatus
      tags: [orders]
      summary: Check order status by email or order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckOrderRequest"
      responses:
        "200":
          description: Orders found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /payment/webhook:
    post:
      operationId: paymentWebhook
      tags: [payment]
      summary: Payment gateway webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admin/orders:
    get:
      operationId: adminGetOrders
      tags: [admin]
      summary: Admin - Get all orders with filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, processing, success, failed]
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedOrders"

  /admin/orders/{orderId}/status:
    patch:
      operationId: adminUpdateOrderStatus
      tags: [admin]
      summary: Admin - Update order status manually
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/games:
    post:
      operationId: adminCreateGame
      tags: [admin]
      summary: Admin - Create a new game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameRequest"
      responses:
        "201":
          description: Game created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /admin/games/{gameId}:
    patch:
      operationId: adminUpdateGame
      tags: [admin]
      summary: Admin - Update a game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameRequest"
      responses:
        "200":
          description: Game updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
    delete:
      operationId: adminDeleteGame
      tags: [admin]
      summary: Admin - Delete a game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Game deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admin/products:
    post:
      operationId: adminCreateProduct
      tags: [admin]
      summary: Admin - Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /admin/products/{productId}:
    patch:
      operationId: adminUpdateProduct
      tags: [admin]
      summary: Admin - Update a product (price, markup)
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: adminDeleteProduct
      tags: [admin]
      summary: Admin - Delete a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Admin - Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    Game:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
        isActive:
          type: boolean
        requiresServerId:
          type: boolean
        serverLabel:
          type: string
          nullable: true
        userIdLabel:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - slug
        - category
        - isActive
        - requiresServerId
        - userIdLabel
        - createdAt

    Product:
      type: object
      properties:
        id:
          type: string
        gameId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        amount:
          type: number
        unit:
          type: string
        buyPrice:
          type: number
        sellPrice:
          type: number
        isActive:
          type: boolean
        supplierCode:
          type: string
          nullable: true
        sortOrder:
          type: number
      required:
        - id
        - gameId
        - name
        - amount
        - unit
        - buyPrice
        - sellPrice
        - isActive
        - sortOrder

    Order:
      type: object
      properties:
        id:
          type: string
        orderNumber:
          type: string
        gameId:
          type: string
        gameName:
          type: string
        productId:
          type: string
        productName:
          type: string
        userId:
          type: string
        serverId:
          type: string
          nullable: true
        email:
          type: string
        amount:
          type: number
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, processing, success, failed]
        paymentMethod:
          type: string
          nullable: true
        paymentUrl:
          type: string
          nullable: true
        supplierRef:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - orderNumber
        - gameId
        - gameName
        - productId
        - productName
        - userId
        - email
        - amount
        - totalPrice
        - status
        - createdAt
        - updatedAt

    OrderWithPayment:
      type: object
      properties:
        order:
          $ref: "#/components/schemas/Order"
        paymentUrl:
          type: string
          nullable: true
        paymentReference:
          type: string
          nullable: true
      required:
        - order

    CreateOrderRequest:
      type: object
      properties:
        gameId:
          type: string
        productId:
          type: string
        userId:
          type: string
        serverId:
          type: string
        email:
          type: string
        paymentMethod:
          type: string
      required:
        - gameId
        - productId
        - userId
        - email
        - paymentMethod

    CheckOrderRequest:
      type: object
      properties:
        email:
          type: string
        orderNumber:
          type: string
      required: []

    UpdateOrderStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, processing, success, failed]
        notes:
          type: string
      required:
        - status

    CreateGameRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        imageUrl:
          type: string
        category:
          type: string
        requiresServerId:
          type: boolean
        serverLabel:
          type: string
        userIdLabel:
          type: string
        isActive:
          type: boolean
      required:
        - name
        - slug
        - category

    CreateProductRequest:
      type: object
      properties:
        gameId:
          type: string
        name:
          type: string
        description:
          type: string
        amount:
          type: number
        unit:
          type: string
        buyPrice:
          type: number
        sellPrice:
          type: number
        supplierCode:
          type: string
        sortOrder:
          type: number
        isActive:
          type: boolean
      required:
        - gameId
        - name
        - amount
        - unit
        - buyPrice
        - sellPrice

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        amount:
          type: number
        unit:
          type: string
        buyPrice:
          type: number
        sellPrice:
          type: number
        supplierCode:
          type: string
        sortOrder:
          type: number
        isActive:
          type: boolean

    PaginatedOrders:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: number
        page:
          type: number
        limit:
          type: number
        totalPages:
          type: number
      required:
        - orders
        - total
        - page
        - limit
        - totalPages

    AdminStats:
      type: object
      properties:
        totalOrders:
          type: number
        pendingOrders:
          type: number
        successOrders:
          type: number
        failedOrders:
          type: number
        totalRevenue:
          type: number
        totalProfit:
          type: number
        todayOrders:
          type: number
        todayRevenue:
          type: number
      required:
        - totalOrders
        - pendingOrders
        - successOrders
        - failedOrders
        - totalRevenue
        - totalProfit
        - todayOrders
        - todayRevenue
